version: '3.9'

# Production stack on Contabo VPS

services:
  caddy:
    image: caddy:2-alpine
    container_name: highway-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"  # Admin API (bind to 127.0.0.1 in prod!)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - highway-public
    environment:
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}

  postgres:
    image: postgres:16-alpine
    container_name: highway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: highway
      POSTGRES_USER: highway
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - highway-pg-data:/var/lib/postgresql/data
    networks:
      - highway-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U highway"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: highway-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - highway-redis-data:/data
    networks:
      - highway-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: highway-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://highway:${DB_PASSWORD}@postgres:5432/highway
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}
      API_URL: https://${PLATFORM_DOMAIN}
      WEB_URL: https://${PLATFORM_DOMAIN}
      CADDY_ADMIN: http://caddy:2019
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      # Docker socket — lets Highway manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Build workspace
      - highway-builds:/tmp/highway-builds
    networks:
      - highway-public
      - highway-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  highway-public:
    name: highway-public
    driver: bridge
  highway-internal:
    name: highway-internal
    driver: bridge
    internal: true  # No internet access from platform DB/Redis

volumes:
  caddy-data:
  caddy-config:
  highway-pg-data:
  highway-redis-data:
  highway-builds:
