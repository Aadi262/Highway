version: '3.9'

# Production stack on Contabo VPS

services:
  caddy:
    image: caddy:2-alpine
    container_name: highway-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - highway-public
    environment:
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}

  postgres:
    image: postgres:16-alpine
    container_name: highway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: highway
      POSTGRES_USER: highway
      POSTGRES_PASSWORD: highway
    volumes:
      - highway-pg-data:/var/lib/postgresql/data
    networks:
      - highway-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U highway"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: highway-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - highway-redis-data:/data
    networks:
      - highway-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    privileged: true
    restart: unless-stopped
    networks:
      - highway-public

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${PLATFORM_DOMAIN}:4000
    container_name: highway-app
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}
      API_URL: ${API_URL}
      WEB_URL: ${WEB_URL}
      CADDY_ADMIN: http://highway-caddy:2019
      BUILDKIT_HOST: docker-container://buildkit
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - highway-builds:/tmp/highway-builds
    networks:
      - highway-public
      - highway-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      buildkit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  highway-public:
    name: highway-public
    driver: bridge
  highway-internal:
    name: highway-internal
    driver: bridge
    internal: true

volumes:
  caddy-data:
  caddy-config:
  highway-pg-data:
  highway-redis-data:
  highway-builds:
