version: '3.9'

# Local development stack — mirrors what runs on Contabo VPS
services:
  postgres:
    image: postgres:16-alpine
    container_name: highway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: highway
      POSTGRES_PASSWORD: password
      POSTGRES_DB: highway
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U highway']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: highway_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
